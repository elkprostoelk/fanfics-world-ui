<p-table
        [value]="users.pageContent"
        [showLoader]="true"
        [loading]="usersTableLoading">
  <ng-template pTemplate="header">
    <tr>
      <th>ID</th>
      <th>User Name</th>
      <th>Email</th>
      <th>Registration Date</th>
      <th>Date of Birth</th>
      <th>Fanfics Count</th>
      <th>Coauthored Fanfics Count</th>
      <th>Tools</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-user>
    <tr>
      <td>{{ user.id }}</td>
      <td>{{ user.userName }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.registrationDate | date: 'long' }}</td>
      <td>{{ user.dateOfBirth | date: 'mediumDate' }}</td>
      <td>{{ user.fanficsCount }}</td>
      <td>{{ user.coauthoredFanficsCount }}</td>
      <td>
        <p-button
          severity="secondary"
          [text]="true"
          icon="pi pi-pencil"
          pTooltip="Edit user info">
        </p-button>
        <p-button
          severity="danger"
          icon="pi pi-trash"
          *ngIf="notMe(user.id) | async"
          pTooltip="Delete user"
          (click)="onDeleteUserClick(user.id)">
        </p-button>
      </td>
    </tr>
  </ng-template>
</p-table>
<p-confirmDialog></p-confirmDialog>
<p-paginator
  (onPageChange)="pageChangeHandler($event)"
  [rows]="users.itemsPerPage"
  [totalRecords]="users.totalItems"
  [rowsPerPageOptions]="[5, 10, 20]"
  [showCurrentPageReport]="true"
>
</p-paginator>
