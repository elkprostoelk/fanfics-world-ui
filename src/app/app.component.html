<div class="wrapper">
  <header class="header navbar">
    <a routerLink="/"><img class="img-fluid" src="assets/img/cite-main-icon.jpg" alt="Fanfics World Icon"/></a>
    <div class="navbar-text">
      <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <ng-container *ngIf="userLoggedIn; else notLoggedIn">
          <button class="btn btn-outline-dark border-0" type="button" disabled="disabled">{{(authService.loggedInUser | async)?.userName}}</button>
          <button class="btn btn-sm btn-outline-dark" type="button" routerLink="/add-fanfic">Add fanfic</button>
          <button class="btn btn-sm btn-outline-dark" type="button" (click)="logoutUser()">Logout</button>
        </ng-container>
        <ng-template #notLoggedIn>
          <button class="btn btn-sm btn-outline-dark me-md-2" type="button" routerLink="/login">Login</button>
          <button class="btn btn-sm btn-outline-dark" type="button" routerLink="/register">Register</button>
        </ng-template>
        <select class="form-select bg-success border-success w-50 m-1" #selectedLanguage (change)="switchLanguage(selectedLanguage.value)">
          <option *ngFor="let language of translate.getLangs()" [value]="language" [selected]="language === translate.currentLang">
            {{ language }}
          </option>
        </select>
      </div>
    </div>
  </header>
  <main class="main">
    <router-outlet></router-outlet>
  </main>
  <footer class="footer">
    &copy; Developed by <a class="github-link" href="https://github.com/elkprostoelk" target="new" title="My GitHub account">elkprostoelk</a>. All rights reserved.
  </footer>
  <app-toasts aria-live="polite" aria-atomic="true"></app-toasts>
</div>
