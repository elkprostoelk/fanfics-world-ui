<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      background-color: #333;
      color: white;
      text-align: left;
      padding: 10px;
      border-radius: 0 0 10px 10px;
    }

    .footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      border-radius: 10px 10px 0 0;
    }

    .main {
      flex: 1;
      overflow-y: scroll;
      padding: 20px;
    }

    .block {
      background-color: #f0f0f0;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Header</h1>
    </div>
    <div class="main">
      <div class="block">
        <h2>Block 1</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed eget justo nec lectus tincidunt vehicula.</p>
      </div>
      <div class="block">
        <h2>Block 2</h2>
        <p>Integer aliquet, arcu sed congue iaculis, dolor neque lacinia augue, in eleifend urna eros et lectus.</p>
      </div>
    </div>
    <div class="footer">
      <p>Footer</p>
    </div>
  </div>
</body>
</html>
